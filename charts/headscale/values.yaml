# Default values for headscale.

image:
  repository: headscale/headscale
  pullPolicy: IfNotPresent
  # Overrides the image tag — default is chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# ── Private key storage ───────────────────────────────────────────────────────
# Keys are mounted from a Kubernetes Secret (not a PVC) at /etc/headscale/keys/.
# Use an externally managed secret (e.g. Sealed Secrets, External Secrets Operator)
# and set existingSecret, or provide the raw PEM content below to let the chart
# create a Secret for you.
keys:
  # Name of an existing Secret to use. Must contain the keys named in secretKeys.
  existingSecret: ""

  # Key names inside the Secret
  secretKeys:
    privateKey: "private.key"
    noisePrivateKey: "noise_private.key"

  # Inline PEM content. Only used when existingSecret is empty.
  # The chart will create a Secret named <fullname>-keys.
  privateKey: ""
  noisePrivateKey: ""

podSecurityContext:
  fsGroup: 65534

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ── Headscale application configuration ─────────────────────────────────────

config:
  # Public URL headscale is reachable at (required)
  serverUrl: "https://headscale.example.com"

  # HTTP listen address inside the container
  listenAddr: "0.0.0.0:8080"

  # Prometheus metrics endpoint
  metricsListenAddr: "0.0.0.0:9090"

  # gRPC listen address (used by headscale CLI)
  grpcListenAddr: "0.0.0.0:50443"
  grpcAllowInsecure: false

  # IP prefixes assigned to nodes
  prefixes:
    v4: "100.64.0.0/10"
    v6: "fd7a:115c:a1e0::/48"
    allocation: "sequential"  # sequential | random

  # Log configuration
  log:
    format: text   # text | json
    level: info

  # DNS configuration
  dns:
    magicDns: true
    baseDomain: "example.ts.net"
    nameservers:
      global:
        - "8.8.8.8"
    searchDomains: []
    # Path to a JSON file with extra DNS records served to nodes (optional)
    extraRecordsPath: ""

  # ACL policy file path (mount via extraVolumes if needed)
  aclPolicyPath: ""

  # Database
  database:
    type: sqlite   # sqlite | postgres
    sqlite:
      path: "/var/lib/headscale/db.sqlite"
    # Used when type is postgres
    postgres:
      host: ""
      port: 5432
      name: "headscale"
      user: "headscale"
      password: ""
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxIdleTimeSecs: 3600
      ssl: false

  # TLS (usually handled by an Ingress; leave blank to disable)
  tls:
    letsencryptHostname: ""
    letsencryptEmail: ""
    letsencryptChallengeType: "HTTP-01"
    certPath: ""
    keyPath: ""

  # OIDC SSO (optional)
  oidc:
    enabled: false
    onlyStartIfOidcIsAvailable: true
    issuer: ""
    clientId: ""
    clientSecret: ""
    # Alternatively, read the client secret from a mounted file.
    # Mutually exclusive with clientSecret.
    clientSecretPath: ""
    expiry: "180d"
    useExpiryFromToken: false
    scope: ["openid", "profile", "email"]
    # Require the OIDC provider to have verified the user's email (v0.28+)
    emailVerifiedRequired: true
    # Extra key/value pairs sent to the identity provider authorization endpoint.
    extraParams: {}
    allowedDomains: []
    allowedUsers: []
    # Requires the OIDC groups scope/claim when used.
    allowedGroups: []
    # Deprecated: use allowedGroups. Kept for compatibility with older chart values.
    allowedOrgs: []
    pkce:
      enabled: false
      method: "S256"

  # Misc
  ephemeralNodeInactivityTimeout: "30m"
  nodeUpdateCheckInterval: "10s"
  disableCheckUpdates: true
  randomizeClientPort: false

  # Taildrop — peer-to-peer file sharing (v0.28+)
  taildrop:
    enabled: true

  # Tuning — advanced performance knobs (v0.28+)
  tuning:
    notifierSendTimeout: "5s"
    batchChangeDelay: "800ms"
    nodeMapSessionBufferedChanSize: 30

  # Additional raw config keys merged into the rendered config
  # Use for options not yet exposed above. Accepts a YAML object.
  extraConfig: {}

# ── DERP configuration ───────────────────────────────────────────────────────

derp:
  # Embedded DERP server built into headscale
  server:
    enabled: false
    regionId: 999
    regionCode: "headscale"
    regionName: "Headscale Embedded DERP"
    # Public IPv4/IPv6 of this node (required when embedded DERP is enabled)
    ipv4: ""
    ipv6: ""
    stunListenAddr: "0.0.0.0:3478"
    privateKeyPath: "/var/lib/headscale/derp_server_private.key"
    automaticallyAddEmbeddedDerpRegion: true
    # Reject DERP connections from nodes not in this headscale instance (v0.27+)
    verifyClients: false

  # External DERP map URLs (Tailscale default map is included when non-empty)
  urls:
    - "https://controlplane.tailscale.com/derpmap/default"

  # Paths to locally-mounted DERP map JSON files
  paths: []

  # Custom DERP regions defined directly in values.
  # These are rendered into a ConfigMap and mounted automatically.
  # Leave empty to disable. Example:
  # customRegions:
  #   900:
  #     regionid: 900
  #     regioncode: eu-nl
  #     regionname: Europe Netherlands
  #     nodes:
  #       - name: 900a
  #         regionid: 900
  #         hostname: derp-eu.ixsa.net
  #         ipv4: "1.2.3.4"
  #         stunport: 3478
  #         derpport: 443
  customRegions: {}

  autoUpdateEnabled: true
  updateFrequency: "24h"

  # ── Standalone DERP relay (separate Deployment + Service) ─────────────────
  # Deploys Tailscale's official derper binary alongside headscale.
  # Useful when you want a dedicated relay without embedding it in headscale.
  standalone:
    enabled: false

    image:
      repository: ghcr.io/tailscale/derper
      tag: "latest"
      pullPolicy: IfNotPresent

    # Hostname the derper TLS certificate is issued for
    hostname: "derp.example.com"

    # When true, derper fetches its own Let's Encrypt cert automatically.
    # Set to false and provide certSecret when managing certs externally.
    certMode: "letsencrypt"   # letsencrypt | manual

    # Secret name containing tls.crt / tls.key (used when certMode=manual)
    certSecret: ""

    # Verify Tailscale clients are actually Tailscale nodes
    verifyClients: false

    service:
      type: LoadBalancer
      httpsPort: 443
      stunPort: 3478
      annotations: {}

    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    nodeSelector: {}
    tolerations: []
    affinity: {}

# ── Headplane UI ─────────────────────────────────────────────────────────────
# Deploys Headplane (https://github.com/tale/headplane) — a full-featured
# headscale admin UI. Served at /admin. Requires headscale >= 0.26.0.

ui:
  enabled: false

  image:
    repository: ghcr.io/tale/headplane
    tag: "latest"
    pullPolicy: IfNotPresent

  # Public URL where Headplane itself is reachable (used for cookie domain and
  # OAuth callbacks). Must NOT have a trailing slash.
  baseUrl: "https://headplane.example.com"

  # Internal URL to the headscale HTTP API. Defaults to the headscale service
  # in the same namespace when left empty.
  headscaleUrl: ""

  # Headscale API key — generate with:
  #   kubectl exec -n <ns> deploy/<release> -- headscale apikeys create --expiration 90d
  # Leave empty and set existingSecret instead when using external secret management.
  apiKey: ""

  # 32-character secret for session cookie signing.
  # Generate with: openssl rand -hex 16
  cookieSecret: ""

  # Reference a pre-existing Secret instead of creating one from the inline
  # values above. Must contain keys: api-key, cookie-secret
  existingSecret: ""

  # Set false only when running without TLS (local testing)
  cookieSecure: true

  # Mount headscale's ConfigMap into Headplane so it can read the headscale
  # config for deeper feature integration (routes, DNS, etc.)
  readHeadscaleConfig: false

  # Kubernetes integration — Headplane reads pod status and validates manifests
  # against the live cluster. Requires RBAC resources (set rbac.create: true).
  integration:
    type: "none"   # none | kubernetes
    rbac:
      create: false

  podAnnotations: {}

  securityContext:
    runAsNonRoot: true
    runAsUser: 65532   # distroless nonroot uid
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  service:
    type: ClusterIP
    port: 3000
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: headplane.example.com
        paths:
          - path: /admin
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Services ─────────────────────────────────────────────────────────────────

service:
  http:
    type: ClusterIP
    port: 8080
    annotations: {}

  grpc:
    type: ClusterIP
    port: 50443
    annotations: {}

  # STUN port exposed when derp.server.enabled = true
  stun:
    type: ClusterIP
    port: 3478
    protocol: UDP
    annotations: {}

# ── Ingress ───────────────────────────────────────────────────────────────────

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: headscale.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Resources ────────────────────────────────────────────────────────────────

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ── Scheduling ───────────────────────────────────────────────────────────────

nodeSelector: {}
tolerations: []
affinity: {}

# Extra volumes / mounts (e.g. for ACL policy files or external TLS certs)
extraVolumes: []
extraVolumeMounts: []

# Extra environment variables injected into the headscale container
extraEnv: []
# - name: FOO
#   value: bar
