{{- if .Values.derp.customRegions -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "headscale.fullname" . }}-derp-regions
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
data:
  custom-regions.yaml: |
    regions:
      {{- .Values.derp.customRegions | toYaml | nindent 6 }}
{{- end }}
