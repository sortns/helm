apiVersion: v1
kind: Service
metadata:
  name: {{ include "headscale.fullname" . }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
  {{- with .Values.service.http.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.http.type }}
  ports:
    - port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "headscale.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "headscale.fullname" . }}-grpc
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
  {{- with .Values.service.grpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.grpc.type }}
  ports:
    - port: {{ .Values.service.grpc.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "headscale.selectorLabels" . | nindent 4 }}
{{- if .Values.derp.server.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "headscale.fullname" . }}-stun
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
  {{- with .Values.service.stun.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.stun.type }}
  ports:
    - port: {{ .Values.service.stun.port }}
      targetPort: stun
      protocol: UDP
      name: stun
  selector:
    {{- include "headscale.selectorLabels" . | nindent 4 }}
{{- end }}
